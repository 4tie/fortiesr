<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoQuant Tab Exploration</title>
<style>
body{margin:0;font-family:ui-sans-serif,system-ui;background:#07110d;color:#e5f7ef}*{box-sizing:border-box}.shell{min-height:100vh;padding:32px;background:radial-gradient(circle at 16% 12%,rgba(17,185,129,.24),transparent 28rem),linear-gradient(135deg,#07110d,#0d1412 48%,#10100b)}.topbar{display:flex;align-items:end;justify-content:space-between;gap:24px;margin:0 auto 24px;max-width:1180px}.eyebrow{margin:0 0 8px;color:#76d3aa;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}h1{margin:0;font-size:clamp(34px,6vw,72px);letter-spacing:-.04em;line-height:.9}.topbar p:last-child{margin:12px 0 0;max-width:560px;color:#9bbbae}nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}button{font:inherit;border:1px solid rgba(123,211,170,.35);border-radius:8px;background:rgba(8,25,18,.72);color:#d7f8e8;cursor:pointer;padding:10px 14px}button.active,.primary-action{background:#10b981;border-color:#54e6ae;color:#03120c;font-weight:800}.layout{display:grid;gap:16px;margin:0 auto;max-width:1180px}.factory-layout{grid-template-columns:.75fr 1.25fr}.mission-layout{grid-template-columns:1.2fr .8fr}.notebook-layout{grid-template-columns:.9fr 1.1fr}.panel{border:1px solid rgba(151,222,189,.18);border-radius:8px;background:rgba(6,17,13,.72);box-shadow:0 24px 80px rgba(0,0,0,.26);padding:18px}.panel-title{color:#82d6ad;font-size:11px;font-weight:900;letter-spacing:.16em;margin-bottom:14px;text-transform:uppercase}.stage-grid,.run-list,.note-stack{display:grid;gap:10px}.stage{align-items:center;border:1px solid rgba(255,255,255,.08);border-radius:8px;display:grid;gap:12px;grid-template-columns:34px 1fr;padding:12px}.stage.passed{background:rgba(16,185,129,.14)}.stage.running{background:rgba(34,211,238,.14);border-color:rgba(34,211,238,.32)}.stage-index{align-items:center;background:rgba(255,255,255,.08);border-radius:7px;display:flex;font-weight:900;height:34px;justify-content:center}.stage strong,.run-row strong,.metric strong{display:block}.stage span,.run-row span,.metric span,.notes p{color:#9bbbae;font-size:13px}.compact{grid-template-columns:repeat(2,minmax(0,1fr))}.config-grid,.telemetry-grid{display:grid;gap:10px;grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:16px}.config-cell,.metric,.note-stack span{background:rgba(255,255,255,.055);border-radius:8px;padding:12px}.run-row{align-items:center;display:grid;gap:12px;grid-template-columns:1fr auto auto auto}.pill{border-radius:999px;padding:5px 9px;text-transform:capitalize}.pill.running{background:rgba(34,211,238,.18);color:#7dd3fc}.pill.completed{background:rgba(16,185,129,.18);color:#86efac}.pill.failed{background:rgba(239,68,68,.18);color:#fca5a5}.curve{align-items:end;display:flex;gap:5px;height:150px;padding-top:16px}.curve i{background:linear-gradient(#67e8f9,#10b981);border-radius:3px 3px 0 0;flex:1}.notes p{font-size:16px;line-height:1.6}@media(max-width:860px){.shell{padding:18px}.topbar,.factory-layout,.mission-layout,.notebook-layout{display:block}nav,.panel{margin-top:16px}}
</style>
</head>
<body>
<main class="shell factory" id="app"></main>
<script>
const stages=["Sanity Backtest","Hyperopt Execution","Auto-Patching","Out-of-Sample Validation","Multi-Pair Stress Test","Risk Assessment","Delivery"];
const detail=["+4.8% IS profit","Epoch 68 / 100","Waiting for candidate","Strict holdout","Top 50 universe","MC p95 DD gate","Export package"];
const runs=[["b2200462","AIStrategy","running","live","pending"],["68fb1bbd","OmniFactory","completed","+2.9%","11.4%"],["41dd901a","MomentumFactory","failed","-1.8%","31.2%"]];
const hypotheses={factory:["Factory Line","Stage-first workflow for confidence before launch."],mission:["Mission Control","Dense telemetry for active run monitoring."],notebook:["Research Notebook","Explanation-forward review for learning from runs."]};
let active="factory";
function stageRail(compact=false){return `<section class="panel"><div class="panel-title">Pipeline Stages</div><div class="stage-grid ${compact?"compact":""}">${stages.map((s,i)=>`<div class="stage ${i===0?"passed":i===1?"running":"pending"}"><div class="stage-index">${i+1}</div><div><strong>${s}</strong><span>${detail[i]}</span></div></div>`).join("")}</div></section>`}
function runList(){return `<section class="panel"><div class="panel-title">Run History</div><div class="run-list">${runs.map(r=>`<div class="run-row"><div><strong>${r[1]}</strong><span>${r[0]}</span></div><span class="pill ${r[2]}">${r[2]}</span><span>${r[3]}</span><span>${r[4]}</span></div>`).join("")}</div></section>`}
function configPanel(){return `<section class="panel"><div class="panel-title">Launch Configuration</div><div class="config-grid">${["AIStrategy","Swing","Balanced","Standard","Binance","Top 50 USDT"].map(i=>`<div class="config-cell">${i}</div>`).join("")}</div><button class="primary-action">Start Auto-Quant</button></section>`}
function telemetry(){return `<section class="panel telemetry"><div class="panel-title">Live Telemetry</div><div class="telemetry-grid">${[["Best candidate","+18.42 USDT"],["Objective","-0.1842"],["Trades","124"],["ETA","14m"]].map(m=>`<div class="metric"><span>${m[0]}</span><strong>${m[1]}</strong></div>`).join("")}</div><div class="curve">${Array.from({length:28}).map((_,i)=>`<i style="height:${28+(i*17)%62}%"></i>`).join("")}</div></section>`}
function notes(){return `<section class="panel notes"><div class="panel-title">Research Notes</div><p>Current candidate is improving in-sample profit, but OOS validation and Monte Carlo remain the decision gates. The interface should teach the user why a strategy is promoted or rejected without implying profit.</p><div class="note-stack"><span>Hold fixed: backend metrics are source of truth.</span><span>Watch: drawdown compression across pair universe.</span><span>Next decision: allow the run to finish risk assessment.</span></div></section>`}
function render(){const h=hypotheses[active];document.getElementById("app").className=`shell ${active}`;document.getElementById("app").innerHTML=`<header class="topbar"><div><p class="eyebrow">AutoQuantTab design exploration</p><h1>${h[0]}</h1><p>${h[1]}</p></div><nav>${Object.keys(hypotheses).map(k=>`<button class="${k===active?"active":""}" onclick="active='${k}';render()">${hypotheses[k][0]}</button>`).join("")}</nav></header>${active==="factory"?`<div class="layout factory-layout">${configPanel()}${stageRail()}${runList()}</div>`:active==="mission"?`<div class="layout mission-layout">${telemetry()}${stageRail(true)}${runList()}</div>`:`<div class="layout notebook-layout">${notes()}${stageRail()}${telemetry()}</div>`}`;}
render();
</script>
</body>
</html>
