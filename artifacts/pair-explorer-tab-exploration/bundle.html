<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Explorer Tab Exploration</title>
<style>
:root{color:#e9f7ef;background:#09120e;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#09120e}button{font:inherit}.shell{min-height:100vh;padding:28px;background:linear-gradient(180deg,rgba(27,92,61,.22),transparent 320px),#09120e}.topbar{align-items:end;display:flex;gap:24px;justify-content:space-between;margin:0 auto 18px;max-width:1240px}.eyebrow{color:#86d9a6;font-size:11px;font-weight:800;letter-spacing:.14em;margin:0 0 8px;text-transform:uppercase}h1{font-size:clamp(30px,4vw,52px);letter-spacing:-.02em;line-height:1;margin:0}.topbar p:last-child{color:#abc7b8;line-height:1.5;margin:10px 0 0;max-width:620px}nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}nav button,.action{background:rgba(7,24,16,.9);border:1px solid rgba(134,217,166,.28);border-radius:8px;color:#dff7e9;cursor:pointer;padding:10px 13px}nav button.active,.action{background:#38d17c;border-color:#81f0ad;color:#04120a;font-weight:800}.layout{display:grid;gap:14px;margin:0 auto;max-width:1240px}.radar-layout{grid-template-columns:1fr 1.45fr .95fr}.control-layout{grid-template-columns:1.1fr .9fr}.workbench-layout{grid-template-columns:.85fr 1.15fr}.setup-strip{grid-column:1/-1}.panel{background:rgba(8,22,15,.88);border:1px solid rgba(178,230,196,.17);border-radius:8px;box-shadow:0 18px 60px rgba(0,0,0,.26);padding:16px}.panel-title{color:#8de0ad;font-size:11px;font-weight:900;letter-spacing:.14em;margin-bottom:12px;text-transform:uppercase}.setup-strip{align-items:center;display:grid;gap:10px;grid-template-columns:repeat(6,minmax(0,1fr)) auto}.setup-cell,.metrics div,.apply-preview,.diag-row{background:rgba(255,255,255,.055);border-radius:8px;padding:12px}.setup-cell span,.metrics span,.history-row span,.stage span,.diag-row span,.apply-preview p{color:#a8c4b5;display:block;font-size:12px}.setup-cell strong,.metrics strong,.history-row strong,.stage strong{display:block;margin-top:4px}.stage-stack,.history,.diagnostics{display:grid;gap:10px}.stage{align-items:center;border:1px solid rgba(255,255,255,.08);border-radius:8px;display:grid;gap:12px;grid-template-columns:34px 1fr;padding:11px}.stage b{align-items:center;background:rgba(255,255,255,.08);border-radius:7px;display:flex;height:34px;justify-content:center}.stage.done{background:rgba(56,209,124,.12)}.stage.active{background:rgba(87,205,193,.12);border-color:rgba(87,205,193,.32)}.compact{grid-template-columns:repeat(2,minmax(0,1fr))}.radar-header,.radar-row,.history-row{align-items:center;display:grid;gap:10px}.radar-header,.radar-row{grid-template-columns:1fr 64px 74px 1.25fr}.radar-header{color:#86d9a6;font-size:11px;font-weight:800;letter-spacing:.08em;padding:0 10px 8px;text-transform:uppercase}.radar-row{border-radius:8px;margin-bottom:8px;padding:12px 10px}.radar-row.selected{background:rgba(56,209,124,.14)}.radar-row.watch{background:rgba(87,205,193,.11)}.radar-row.hold{background:rgba(245,166,74,.11)}.radar-row.blocked,.diag-row.warn{background:rgba(239,93,80,.12)}.radar-row em{color:#a8c4b5;font-size:12px;font-style:normal}.metrics{display:grid;gap:10px;grid-template-columns:repeat(4,minmax(0,1fr))}.bars{align-items:end;display:flex;gap:5px;height:170px;margin-top:16px}.bars i{background:linear-gradient(#57cdc1,#38d17c);border-radius:3px 3px 0 0;flex:1}table{border-collapse:collapse;width:100%}th{color:#86d9a6;font-size:11px;letter-spacing:.08em;text-align:left;text-transform:uppercase}td,th{border-bottom:1px solid rgba(255,255,255,.07);padding:10px 8px}td{color:#dceee5;font-size:13px}.status{border-radius:999px;display:inline-flex;font-size:11px;font-weight:800;padding:4px 8px;text-transform:capitalize}.status.completed{background:rgba(56,209,124,.16);color:#9bf0b7}.status.running{background:rgba(87,205,193,.16);color:#9ceee7}.status.failed{background:rgba(239,93,80,.16);color:#ffb3aa}.history-row{grid-template-columns:1fr auto auto auto}.pair-grid{display:grid;gap:8px;grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:14px}.pair-grid span{background:rgba(56,209,124,.13);border:1px solid rgba(56,209,124,.26);border-radius:8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;padding:10px}.apply-preview{margin-bottom:14px}.apply-preview p{line-height:1.5;margin:6px 0 0}.diag-row strong{display:block;margin-bottom:5px}@media(max-width:940px){.shell{padding:18px}.topbar,.radar-layout,.control-layout,.workbench-layout,.setup-strip{display:block}nav,.panel,.setup-cell,.action{margin-top:12px}.metrics,.compact,.pair-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="shell radar" id="app"></main>
<script>
const views={radar:["Market Radar","Discovery and ranking first, optimized for choosing promising pairs quickly."],control:["Backtest Control Room","Live progress, failures, and diagnostics first, optimized for active monitoring."],workbench:["Portfolio Workbench","Selected pairs and apply flow first, optimized for strategy configuration."]};
const setup=[["Strategy","MeanRevertX"],["Timeframe","1h"],["Range","20240101-20240601"],["Wallet","2500 USDT"],["Max trades","4"],["Pair groups","6"]];
const stages=[["Queued","done","Strategy and pair universe accepted"],["Downloading","done","Candles available for 22 of 24 pairs"],["Backtesting","active","4 groups complete, 1 running"],["Scoring","waiting","Waiting for final result rows"],["Apply","waiting","Review selected pairs before sync"]];
const results=[["BTC/USDT + ETH/USDT","completed",8.5,60,5.1,12,94],["SOL/USDT + AVAX/USDT","completed",6.2,57,7.4,18,87],["LINK/USDT + AAVE/USDT","running",2.4,52,4.8,9,73],["XRP/USDT + DOGE/USDT","failed",null,null,null,0,18],["ADA/USDT + MATIC/USDT","completed",3.8,55,8.9,15,76]];
const radarPairs=[["BTC/USDT",96,"+4.2%","High liquidity","selected"],["ETH/USDT",92,"+4.0%","Stable sample","selected"],["SOL/USDT",88,"+3.6%","Momentum pocket","watch"],["AVAX/USDT",81,"+2.7%","Volatile but tradable","watch"],["LINK/USDT",74,"+1.9%","Needs longer range","hold"],["DOGE/USDT",31,"-2.4%","Failed data check","blocked"]];
const history=[["session-8142","MeanRevertX","completed","24 pairs","12m ago"],["session-8011","BreakoutLab","failed","18 pairs","1h ago"],["session-7920","GridScout","completed","30 pairs","yesterday"]];
let active="radar";
function status(s){return `<span class="status ${s}">${s}</span>`}
function setupStrip(){return `<section class="panel setup-strip">${setup.map(([l,v])=>`<div class="setup-cell"><span>${l}</span><strong>${v}</strong></div>`).join("")}<button class="action" type="button">Run Exploration</button></section>`}
function stageStack(compact=false){return `<section class="panel"><div class="panel-title">Run Lifecycle</div><div class="stage-stack ${compact?"compact":""}">${stages.map(([n,s,d],i)=>`<div class="stage ${s}"><b>${i+1}</b><div><strong>${n}</strong><span>${d}</span></div></div>`).join("")}</div></section>`}
function radarList(){return `<section class="panel radar-list"><div class="panel-title">Market Radar</div><div class="radar-header"><span>Pair</span><span>Score</span><span>Profit</span><span>Signal</span></div>${radarPairs.map(([p,s,pr,n,state])=>`<div class="radar-row ${state}"><strong>${p}</strong><span>${s}</span><span>${pr}</span><em>${n}</em></div>`).join("")}</section>`}
function resultsMatrix(){return `<section class="panel results"><div class="panel-title">Result Rows</div><table><thead><tr><th>Group</th><th>Profit</th><th>Win</th><th>DD</th><th>Trades</th><th>Status</th></tr></thead><tbody>${results.map(([g,s,p,w,d,t])=>`<tr><td>${g}</td><td>${p==null?"-":"+"+p.toFixed(1)+"%"}</td><td>${w==null?"-":w+"%"}</td><td>${d==null?"-":d.toFixed(1)+"%"}</td><td>${t}</td><td>${status(s)}</td></tr>`).join("")}</tbody></table></section>`}
function telemetry(){return `<section class="panel telemetry"><div class="panel-title">Telemetry</div><div class="metrics">${[["Progress","67%"],["Completed groups","4 / 6"],["Best group","+8.5%"],["Failures","1"]].map(([l,v])=>`<div><span>${l}</span><strong>${v}</strong></div>`).join("")}</div><div class="bars" aria-label="Mock backtest progress">${Array.from({length:30}).map((_,i)=>`<i style="height:${24+(i*19)%68}%"></i>`).join("")}</div></section>`}
function historyPanel(){return `<section class="panel history"><div class="panel-title">Past Runs</div>${history.map(([id,strategy,s,count,age])=>`<div class="history-row"><div><strong>${strategy}</strong><span>${id}</span></div>${status(s)}<span>${count}</span><span>${age}</span></div>`).join("")}</section>`}
function diagnostics(){return `<section class="panel diagnostics"><div class="panel-title">Diagnostics</div><div class="diag-row warn"><strong>XRP/USDT + DOGE/USDT</strong><span>Skipped because the downloaded range had missing candles.</span></div><div class="diag-row"><strong>Shared state</strong><span>Apply selected pairs only. Strategy, dates, wallet, and threshold semantics stay unchanged.</span></div></section>`}
function basket(){return `<section class="panel basket"><div class="panel-title">Selected Pairs</div><div class="pair-grid">${["BTC/USDT","ETH/USDT","SOL/USDT","AVAX/USDT"].map(p=>`<span>${p}</span>`).join("")}</div><div class="apply-preview"><strong>Apply preview</strong><p>Only the shared pair list changes. The active strategy keeps its existing timeframe, wallet, and validation rules.</p></div><button class="action" type="button">Apply 4 Pairs</button></section>`}
function content(){if(active==="radar")return `<div class="layout radar-layout">${setupStrip()}${radarList()}${stageStack()}${historyPanel()}</div>`;if(active==="control")return `<div class="layout control-layout">${telemetry()}${stageStack(true)}${diagnostics()}${resultsMatrix()}</div>`;return `<div class="layout workbench-layout">${basket()}${resultsMatrix()}${historyPanel()}${diagnostics()}</div>`}
function render(){const view=views[active];const app=document.getElementById("app");app.className=`shell ${active}`;app.innerHTML=`<header class="topbar"><div><p class="eyebrow">PairExplorerTab design exploration</p><h1>${view[0]}</h1><p>${view[1]}</p></div><nav aria-label="Exploration views">${Object.keys(views).map(id=>`<button class="${id===active?"active":""}" data-view="${id}" type="button">${views[id][0]}</button>`).join("")}</nav></header>${content()}`;app.querySelectorAll("[data-view]").forEach(button=>button.addEventListener("click",()=>{active=button.dataset.view;render()}))}
render();
</script>
</body>
</html>
