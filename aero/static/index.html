<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AeRo - Strategy Doctor</title>
<link rel="stylesheet" href="/aero/static/styles.css" />
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="logo">AeRo</div>
      <div class="sub">Strategy Doctor</div>
    </div>
    <nav class="tabs">
      <button data-target="upload" class="tab active">Upload</button>
      <button data-target="test" class="tab">Test</button>
      <button data-target="read" class="tab">Read</button>
      <button data-target="learn" class="tab">Learn</button>
      <button data-target="fix" class="tab">Fix</button>
    </nav>
  </header>
  <main class="stage">
    <section id="upload" class="pane active">
      <div class="card">
        <h2>Upload Strategy</h2>
        <p class="hint">Choose an existing backtest or upload a fresh strategy copy.</p>
        <div class="form">
          <label>
            Strategy file
            <input id="strategy-file" type="file" accept=".py,.json" />
          </label>
          <label>
            Existing run
            <select id="existing-run"><option value="">Loading...</option></select>
          </label>
          <button type="button" id="upload-action" class="primary">Use selected run</button>
          <div id="upload-status" class="status"></div>
        </div>
      </div>
    </section>
    <section id="test" class="pane">
      <div class="card">
        <h2>Run Doctor</h2>
        <p class="hint">This uses an existing backtest result first.</p>
        <button id="run-button" class="primary">Run AeRo on latest result</button>
        <pre id="test-log" class="status" style="margin-top:10px">No run yet.</pre>
      </div>
    </section>
    <section id="read" class="pane">
      <div id="read-result" class="status">Run doctor first.</div>
    </section>
    <section id="learn" class="pane">
      <div id="learn-empty" class="empty">Run doctor first.</div>
      <ul id="learn-list" class="findings"></ul>
    </section>
    <section id="fix" class="pane">
      <div id="fix-empty" class="empty">Run doctor first.</div>
      <div id="fix-actions" class="chip-row">
        <a id="fix-download" class="button hidden" href="#" target="_blank">Download improved copy</a>
        <button id="fix-apply" class="button hidden">Apply improved copy to sandbox</button>
      </div>
      <div id="fix-status" class="status" style="margin-top:8px"></div>
      <div id="fix-body"></div>
    </section>
  </main>
</div>
<script src="/aero/static/app.js"></script>
</body>
</html>
