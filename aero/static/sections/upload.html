<div class="card">
  <h2>Upload Strategy</h2>
  <p class="hint">AeRo edits a copy only. The original file stays untouched.</p>
  <form id="upload-form" class="form">
    <label>
      Strategy file
      <input type="file" id="strategy-file" accept=".py,.json" />
    </label>
    <label>
      Or choose an existing backtest result run
      <select id="existing-run"></select>
    </label>
    <button type="submit">Use selected strategy</button>
  </form>
  <pre id="upload-status" class="status"></pre>
</div>
